kind = "web"
previewPath = "/"
title = "SMI Arawani School Portal"
version = "1.0.0"
id = "artifacts/smi-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23417

[services.development]
run = "pnpm --filter @workspace/smi-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/smi-website", "run", "build" ]
publicDir = "artifacts/smi-website/out"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23417"
